services:
  # База данных для метаданных Airflow
  postgres:
    image: psql_img:16
    # build: ./postgres # Если собирать с Dockerfile
    container_name: postgres_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Инициализация базы данных (выполнится один раз)
  airflow-init:
      # image: airflow:low
      build: ./airflow # Если собирать с Dockerfile
      depends_on:
        postgres:
          condition: service_healthy
      environment:
        # postgresql+psycopg2://<USER>:<PASSWORD>@<SERVICE_NAME>/<DB_NAME>
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
        AIRFLOW__CORE__LOAD_EXAMPLES: true
        AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      # Эта команда создаст таблицы и создаст пользователя admin/admin
      command: >
        bash -c "airflow db init &&
        airflow users create 
        --username \"${AIRFLOW_USER}\" 
        --firstname \"${AIRFLOW_USER_FIRSTNAME}\"  
        --lastname \"${AIRFLOW_USER_LASTNAME}\" 
        --role Admin 
        --email admin@example.com 
        --password \"${AIRFLOW_PASSWORD}\"
        "

  # Веб-интерфейс Airflow
  airflow-webserver:
    # image: airflow:low
    build: ./airflow # Если собирать с Dockerfile
    container_name: airflow_web
    restart: always
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # postgresql+psycopg2://<USER>:<PASSWORD>@<SERVICE_NAME>/<DB_NAME>
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: true
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/spark_local_cache:/opt/airflow/spark_local_cache
    command: webserver

  # Планировщик (без него DAG-и не будут запускаться сами)
  airflow-scheduler:
    # image: airflow:low
    build: ./airflow # Если собирать с Dockerfile
    container_name: airflow_scheduler
    restart: always
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: true
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/spark_local_cache:/opt/airflow/spark_local_cache
    command: scheduler

  # MinIO
  minio:
    image: storage:latest
    # build: ./storage_lakehouse # Если собирать с Dockerfile
    container_name: minio_container
    ports:
      - "9050:9000"
      - "9051:9001"
    environment:  
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER: ${MINIO_BROWSER}
      MINIO_IDENTITY_OPENID_ENABLE: ${MINIO_IDENTITY_OPENID_ENABLE}
      MINIO_CALLHOME_ENABLE: ${MINIO_CALLHOME_ENABLE}
    volumes:
      - ./storage_lakehouse/storage_data:/data
    command: server /data --console-address ":9001"